<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Candy Days Admin</title>
  <style>body{margin:0;font-family:system-ui,-apple-system,sans-serif}</style>
</head>
<body>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  <script>
    CMS.init({
      config: {
        backend: {
          name: 'git-gateway',
          repo: 'YOUR_GITHUB_REPO',
          branch: 'main',
          base_url: 'YOUR_NETLIFY_SITE_URL'
        },
        media_folder: 'public/images',
        public_folder: '/images',
        collections: [
          {
            name: 'products',
            label: 'Products',
            folder: 'content/products',
            create: true,
            slug: '{{slug}}',
            fields: [
              { label: 'Name', name: 'name', widget: 'string' },
              { label: 'Description', name: 'description', widget: 'text' },
              { label: 'Price', name: 'price', widget: 'string', required: false },
              { label: 'Image', name: 'image', widget: 'string' },
              { label: 'Tag', name: 'tag', widget: 'string', required: false },
              { label: 'Category', name: 'category', widget: 'string' },
              { label: 'Order', name: 'order', widget: 'number', default: 0 },
              { label: 'Featured', name: 'featured', widget: 'boolean', default: false },
              { label: 'Visible', name: 'visible', widget: 'boolean', default: true }
            ]
          },
          {
            name: 'testimonials',
            label: 'Testimonials',
            folder: 'content/testimonials',
            create: true,
            slug: '{{slug}}',
            fields: [
              { label: 'Author', name: 'author', widget: 'string' },
              { label: 'Text', name: 'text', widget: 'text' },
              { label: 'Rating', name: 'rating', widget: 'number', default: 5 },
              { label: 'Order', name: 'order', widget: 'number', default: 0 },
              { label: 'Visible', name: 'visible', widget: 'boolean', default: true }
            ]
          },
          {
            name: 'site_config',
            label: 'Site Config',
            files: [
              {
                label: 'Site Configuration',
                name: 'site',
                file: 'content/site.json',
                fields: [
                  { label: 'Brand Name', name: 'brand', widget: 'object', fields: [
                    { label: 'Name', name: 'name', widget: 'string' },
                    { label: 'Tagline', name: 'tagline', widget: 'string' },
                    { label: 'Location', name: 'location', widget: 'string' },
                    { label: 'Description', name: 'description', widget: 'text' },
                    { label: 'Short Description', name: 'descriptionShort', widget: 'text' }
                  ]},
                  { label: 'Contact', name: 'contact', widget: 'object', fields: [
                    { label: 'WhatsApp', name: 'whatsapp', widget: 'string' },
                    { label: 'Address', name: 'address', widget: 'string' },
                    { label: 'Hours', name: 'hours', widget: 'string' }
                  ]},
                  { label: 'Hero', name: 'hero', widget: 'object', fields: [
                    { label: 'Tag', name: 'tag', widget: 'string' },
                    { label: 'Title', name: 'title', widget: 'string' },
                    { label: 'Accent Title', name: 'titleAccent', widget: 'string' },
                    { label: 'Subtitle', name: 'subtitle', widget: 'text' }
                  ]}
                ]
              }
            ]
          }
        ]
      }
    });
  </script>
</body>
</html>
